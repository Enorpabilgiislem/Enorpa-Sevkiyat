<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENORPA · Sevkiyat Yönetimi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #f46736;
    --orange-light: #fff0ea;
    --orange-dark: #c94e22;
    --dark: #1a1a1a;
    --dark2: #2c2c2c;
    --mid: #414244;
    --gray: #8d898d;
    --line: #e8e8e8;
    --bg: #f7f6f4;
    --white: #ffffff;
    --green: #2d9e6b;
    --green-bg: #e8f7f1;
    --red: #d94040;
    --red-bg: #fdeaea;
    --amber: #d48c1a;
    --amber-bg: #fdf3de;
    --blue: #2b7fd4;
    --blue-bg: #e5f0fb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--dark); min-height: 100vh; flex-shrink: 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; }
  .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }
  .topbar { background: var(--white); border-bottom: 1px solid var(--line); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .content { padding: 28px; flex: 1; }

  .brand { padding: 20px 20px 16px; border-bottom: 1px solid #333; }
  .brand-name { font-size: 15px; font-weight: 600; color: var(--white); letter-spacing: .02em; }
  .brand-sub { font-size: 10px; color: #888; letter-spacing: .08em; text-transform: uppercase; margin-top: 2px; }
  .nav { padding: 12px 8px; flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; cursor: pointer; color: #aaa; font-size: 13px; font-weight: 400; transition: all .15s; margin-bottom: 2px; user-select: none; }
  .nav-item:hover { background: #2c2c2c; color: var(--white); }
  .nav-item.active { background: var(--orange); color: var(--white); font-weight: 500; }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: var(--orange); color: white; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 20px; }
  .nav-item.active .nav-badge { background: rgba(255,255,255,.25); }
  .nav-section { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: .1em; padding: 12px 12px 4px; }

  .page-title { font-size: 15px; font-weight: 500; color: var(--dark); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; border: none; font-family: inherit; }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:hover { background: var(--orange-dark); }
  .btn-ghost { background: transparent; color: var(--mid); border: 1px solid var(--line); }
  .btn-ghost:hover { background: var(--bg); }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat { background: var(--white); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }
  .stat-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .stat-val { font-size: 26px; font-weight: 600; line-height: 1; color: var(--dark); }
  .stat-sub { font-size: 11px; color: var(--gray); margin-top: 4px; }
  .stat.orange { border-top: 3px solid var(--orange); }
  .stat.green { border-top: 3px solid var(--green); }
  .stat.amber { border-top: 3px solid var(--amber); }
  .stat.blue { border-top: 3px solid var(--blue); }

  /* Loading bar */
  .loading-bar { display: none; height: 3px; background: var(--line); position: fixed; top: 0; left: 0; right: 0; z-index: 999; overflow: hidden; }
  .loading-bar::after { content: ''; position: absolute; left: -40%; width: 40%; height: 100%; background: var(--orange); animation: loading 1s linear infinite; }
  @keyframes loading { to { left: 140%; } }

  .card { background: var(--white); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--dark); }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 6px 12px; }
  .search-box input { border: none; background: transparent; font-size: 13px; color: var(--dark); outline: none; width: 180px; font-family: inherit; }
  .search-box input::placeholder { color: var(--gray); }
  table { width: 100%; border-collapse: collapse; }
  thead th { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .06em; padding: 10px 16px; text-align: left; background: var(--bg); border-bottom: 1px solid var(--line); }
  tbody tr { border-bottom: 1px solid var(--line); transition: background .1s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  td { padding: 12px 16px; font-size: 13px; color: var(--dark); vertical-align: middle; }
  .mono { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gray); }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: .7; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-orange { background: var(--orange-light); color: var(--orange-dark); }
  .badge-gray { background: #f0f0f0; color: var(--gray); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: flex-start; justify-content: center; padding-top: 60px; }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 14px; width: 680px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: mIn .2s ease; }
  @keyframes mIn { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--white); z-index: 1; border-radius: 14px 14px 0 0; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: var(--bg); border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 16px; color: var(--gray); display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: var(--line); }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 500; color: var(--mid); }
  input, select, textarea { border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--dark); font-family: inherit; outline: none; transition: border-color .15s; background: var(--white); }
  input:focus, select:focus, textarea:focus { border-color: var(--orange); }
  textarea { resize: vertical; min-height: 70px; }

  .ceki-section { margin-top: 16px; }
  .ceki-title { font-size: 12px; font-weight: 600; color: var(--mid); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .ceki-table { width: 100%; border-collapse: collapse; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; font-size: 12px; }
  .ceki-table th { background: var(--bg); padding: 8px 10px; text-align: left; font-weight: 600; color: var(--gray); border-bottom: 1px solid var(--line); font-size: 11px; }
  .ceki-table td { padding: 7px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  .ceki-table tr:last-child td { border-bottom: none; }
  .ceki-table input[type=text], .ceki-table input[type=number] { border: 1px solid var(--line); border-radius: 5px; padding: 4px 8px; font-size: 12px; width: 100%; }
  .ceki-table input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--orange); cursor: pointer; }
  .del-row { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
  .del-row:hover { color: var(--red); background: var(--red-bg); }
  .progress-bar { height: 6px; background: var(--line); border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; background: var(--orange); border-radius: 4px; transition: width .3s; }

  .detail-overlay { display: none; position: fixed; inset: 0; z-index: 90; }
  .detail-overlay.open { display: block; }
  .detail-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; background: var(--white); border-left: 1px solid var(--line); overflow-y: auto; z-index: 91; box-shadow: -8px 0 30px rgba(0,0,0,.08); animation: pIn .2s ease; }
  @keyframes pIn { from { transform: translateX(40px); opacity:0; } to { transform:none; opacity:1; } }
  .detail-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; justify-content: space-between; }
  .detail-id { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gray); margin-bottom: 4px; }
  .detail-name { font-size: 16px; font-weight: 600; }
  .detail-body { padding: 16px 20px; }
  .detail-row { display: flex; align-items: baseline; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--gray); font-size: 12px; }
  .detail-val { font-weight: 500; text-align: right; max-width: 200px; }
  .detail-ceki { margin-top: 16px; }
  .ceki-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .ceki-item:last-child { border-bottom: none; }
  .ceki-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ceki-check.checked { background: var(--green); border-color: var(--green); }
  .ceki-check.checked::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); }
  .ceki-name { flex: 1; }
  .ceki-qty { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gray); }

  .empty { text-align: center; padding: 48px 20px; color: var(--gray); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: .4; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--dark); color: white; padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 999; animation: tIn .3s ease; display: none; }
  .toast.show { display: block; }
  @keyframes tIn { from { opacity:0; transform:translateY(10px); } }

  .status-select { border: 1px solid var(--line); border-radius: 6px; padding: 4px 8px; font-size: 12px; font-family: inherit; cursor: pointer; background: var(--white); color: var(--dark); outline: none; }

  .sync-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--gray); background: none; border: 1px solid var(--line); border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: inherit; }
  .sync-btn:hover { background: var(--bg); color: var(--dark); }
</style>
</head>
<body>

<div class="loading-bar" id="loading-bar"></div>

<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-name">ENORPA</div>
      <div class="brand-sub">Sevkiyat Yönetimi</div>
    </div>
    <nav class="nav">
      <div class="nav-section">Ana Menü</div>
      <div class="nav-item active" onclick="setPage('sevkiyatlar',this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="2"/><path d="M5 7h6M5 10h4"/></svg>
        Sevkiyatlar
        <span class="nav-badge" id="badge-all">0</span>
      </div>
      <div class="nav-item" onclick="setPage('bekleyenler',this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
        Bekleyenler
        <span class="nav-badge" id="badge-bekleyen">0</span>
      </div>
      <div class="nav-item" onclick="setPage('tamamlananlar',this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l3.5 3.5L13 5"/></svg>
        Tamamlananlar
      </div>
      <div class="nav-section">Diğer</div>
      <div class="nav-item" onclick="setPage('ozet',this)">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        Özet & İstatistik
      </div>
    </nav>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="page-title" id="page-title">Tüm Sevkiyatlar</span>
      <div class="topbar-right">
        <button class="sync-btn" onclick="loadData()">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 8a7 7 0 0 1 13-3.5M15 8a7 7 0 0 1-13 3.5"/><path d="M12 1v4h-4M4 15v-4h4"/></svg>
          Yenile
        </button>
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#aaa" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
          <input type="text" placeholder="Ara..." id="search-input" oninput="renderTable()">
        </div>
        <button class="btn btn-primary" onclick="openNew()">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2"><path d="M8 3v10M3 8h10"/></svg>
          Yeni Sevkiyat
        </button>
      </div>
    </div>

    <div class="content">
      <div class="stats" id="stats-area"></div>
      <div class="card" id="main-card">
        <div class="card-header">
          <span class="card-title" id="table-title">Tüm Sevkiyatlar</span>
          <select id="filter-durum" class="status-select" style="width:140px" onchange="renderTable()">
            <option value="">Tüm Durumlar</option>
            <option>Bekliyor</option>
            <option>Hazırlanıyor</option>
            <option>Sevk Edildi</option>
            <option>Tamamlandı</option>
            <option>İptal</option>
          </select>
        </div>
        <div id="table-wrap"></div>
      </div>
    </div>
  </div>
</div>

<!-- YENİ SEVKİYAT MODAL -->
<div class="overlay" id="modal-new">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title-text">Yeni Sevkiyat</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Proje Adı *</label>
          <input type="text" id="f-proje" placeholder="Proje adını girin">
        </div>
        <div class="form-group">
          <label>Müşteri *</label>
          <input type="text" id="f-musteri" placeholder="Müşteri adı">
        </div>
        <div class="form-group">
          <label>Sorumlu Kişi</label>
          <select id="f-sorumlu">
            <option value="">Seçin</option>
            <option>Ayşe Hanım</option>
            <option>Alper Bey</option>
            <option>Quadri Bey</option>
            <option>Nurhayat Hanım</option>
            <option>İbrahim Metin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Planlanan Sevk Tarihi</label>
          <input type="date" id="f-tarih">
        </div>
        <div class="form-group">
          <label>Durum</label>
          <select id="f-durum">
            <option>Bekliyor</option>
            <option>Hazırlanıyor</option>
            <option>Sevk Edildi</option>
            <option>Tamamlandı</option>
            <option>İptal</option>
          </select>
        </div>
        <div class="form-group">
          <label>Taşıma Türü</label>
          <select id="f-tasima">
            <option value="">Seçin</option>
            <option>Kargo</option>
            <option>Araç</option>
            <option>Kurye</option>
            <option>Müşteri Alacak</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Notlar</label>
          <textarea id="f-not" placeholder="Sevkiyat hakkında notlar..."></textarea>
        </div>
      </div>
      <div class="ceki-section">
        <div class="ceki-title">
          Çeki Listesi
          <button class="btn btn-ghost btn-sm" onclick="addCekiRow()">+ Kalem Ekle</button>
        </div>
        <table class="ceki-table">
          <thead>
            <tr><th style="width:36px">✓</th><th>Malzeme Adı</th><th style="width:80px">Miktar</th><th style="width:70px">Birim</th><th style="width:32px"></th></tr>
          </thead>
          <tbody id="ceki-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">İptal</button>
      <button class="btn btn-primary" onclick="saveSevkiyat()">Kaydet</button>
    </div>
  </div>
</div>

<!-- DETAY PANELİ -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()">
  <div class="detail-panel" onclick="event.stopPropagation()">
    <div class="detail-header">
      <div>
        <div class="detail-id" id="d-id"></div>
        <div class="detail-name" id="d-name"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost btn-sm" onclick="editCurrent()">Düzenle</button>
        <button class="modal-close" onclick="closeDetail()">✕</button>
      </div>
    </div>
    <div class="detail-body">
      <div id="d-info"></div>
      <div class="detail-ceki" id="d-ceki"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyNEqXZIgAdHI2wTLLL4l1aMvrL9iNvnWDTEMk629hT9hG4i87zIxASsCZra_zXUXPf/exec";

let data = [];
let currentPage = 'sevkiyatlar';
let currentDetail = null;
let editingId = null;

function showLoading(on) {
  document.getElementById('loading-bar').style.display = on ? 'block' : 'none';
}

async function apiCall(action, payload) {
  try {
    if (action === "getAll") {
      const res = await fetch(API_URL + "?action=getAll");
      const json = await res.json();
      return json.data || [];
    } else {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action, ...payload })
      });
      return await res.json();
    }
  } catch(e) {
    toast("Sheets bağlantı hatası: " + e.message);
    return null;
  }
}

async function loadData() {
  showLoading(true);
  toast("Veriler yükleniyor...");
  const rows = await apiCall("getAll");
  if (rows) {
    data = rows.map(r => ({
      ...r,
      ceki: Array.isArray(r.ceki) ? r.ceki : []
    }));
  }
  showLoading(false);
  renderStats();
  renderTable();
  toast("Veriler güncellendi.");
}

function statusStyle(d) {
  if(d==='Tamamlandı') return 'badge badge-green';
  if(d==='Bekliyor') return 'badge badge-blue';
  if(d==='Hazırlanıyor') return 'badge badge-amber';
  if(d==='Sevk Edildi') return 'badge badge-orange';
  return 'badge badge-gray';
}

function renderStats() {
  const toplam = data.length;
  const bekleyen = data.filter(d=>d.durum==='Bekliyor'||d.durum==='Hazırlanıyor').length;
  const sevkedilen = data.filter(d=>d.durum==='Sevk Edildi').length;
  const tamamlanan = data.filter(d=>d.durum==='Tamamlandı').length;
  document.getElementById('stats-area').innerHTML = `
    <div class="stat orange"><div class="stat-label">Toplam Sevkiyat</div><div class="stat-val">${toplam}</div><div class="stat-sub">Tüm kayıtlar</div></div>
    <div class="stat amber"><div class="stat-label">Bekleyen / Hazırlanan</div><div class="stat-val">${bekleyen}</div><div class="stat-sub">Aksiyon gerekiyor</div></div>
    <div class="stat blue"><div class="stat-label">Yolda</div><div class="stat-val">${sevkedilen}</div><div class="stat-sub">Sevk edildi</div></div>
    <div class="stat green"><div class="stat-label">Tamamlanan</div><div class="stat-val">${tamamlanan}</div><div class="stat-sub">Bu ay</div></div>
  `;
  document.getElementById('badge-all').textContent = toplam;
  document.getElementById('badge-bekleyen').textContent = bekleyen;
}

function getFiltered() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const ds = document.getElementById('filter-durum').value;
  return data.filter(d => {
    const match = !q || d.proje.toLowerCase().includes(q) || d.musteri.toLowerCase().includes(q) || (d.sorumlu||'').toLowerCase().includes(q);
    const dur = !ds || d.durum === ds;
    if(currentPage==='bekleyenler') return match && (d.durum==='Bekliyor'||d.durum==='Hazırlanıyor');
    if(currentPage==='tamamlananlar') return match && d.durum==='Tamamlandı';
    return match && dur;
  });
}

function renderTable() {
  const rows = getFiltered();
  if(!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty"><div class="empty-icon">📦</div>Kayıt bulunamadı.</div>';
    return;
  }
  let html = `<table><thead><tr>
    <th>Sevkiyat No</th><th>Proje</th><th>Müşteri</th><th>Sorumlu</th><th>Sevk Tarihi</th><th>Çeki</th><th>Durum</th><th></th>
  </tr></thead><tbody>`;
  rows.forEach(r => {
    const ceki = Array.isArray(r.ceki) ? r.ceki : [];
    const tamam = ceki.filter(c=>c.tamam).length;
    const top = ceki.length;
    const pct = top ? Math.round(tamam/top*100) : 0;
    const tarih = r.tarih ? new Date(r.tarih).toLocaleDateString('tr-TR') : '—';
    const rid = String(r.id).replace(/'/g,"");
    html += `<tr onclick="openDetail('${rid}')">
      <td><span class="mono">SEV-${String(r.id).slice(-4).padStart(4,'0')}</span></td>
      <td style="font-weight:500">${r.proje}</td>
      <td>${r.musteri}</td>
      <td>${r.sorumlu||'—'}</td>
      <td>${tarih}</td>
      <td>
        <div style="font-size:11px;color:var(--gray);margin-bottom:3px">${tamam}/${top} kalem</div>
        <div class="progress-bar" style="width:80px"><div class="progress-fill" style="width:${pct}%"></div></div>
      </td>
      <td><span class="${statusStyle(r.durum)}">${r.durum}</span></td>
      <td onclick="event.stopPropagation()">
        <select class="status-select" onchange="quickStatus('${rid}', this.value)" onclick="event.stopPropagation()">
          <option value="">Durum Güncelle</option>
          <option>Bekliyor</option><option>Hazırlanıyor</option><option>Sevk Edildi</option><option>Tamamlandı</option><option>İptal</option>
        </select>
      </td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}

async function quickStatus(id, val) {
  if(!val) return;
  const r = data.find(d=>String(d.id)===String(id));
  if(r) {
    r.durum = val;
    renderStats(); renderTable();
    showLoading(true);
    await apiCall("save", { item: r });
    showLoading(false);
    toast('Durum güncellendi: '+val);
  }
}

function openDetail(id) {
  const r = data.find(d=>String(d.id)===String(id));
  if(!r) return;
  currentDetail = id;
  document.getElementById('d-id').textContent = 'SEV-'+String(r.id).slice(-4).padStart(4,'0');
  document.getElementById('d-name').textContent = r.proje;
  const tarih = r.tarih ? new Date(r.tarih).toLocaleDateString('tr-TR') : '—';
  document.getElementById('d-info').innerHTML = `
    <div class="detail-row"><span class="detail-key">Müşteri</span><span class="detail-val">${r.musteri}</span></div>
    <div class="detail-row"><span class="detail-key">Sorumlu</span><span class="detail-val">${r.sorumlu||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">Sevk Tarihi</span><span class="detail-val">${tarih}</span></div>
    <div class="detail-row"><span class="detail-key">Taşıma</span><span class="detail-val">${r.tasima||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">Durum</span><span class="detail-val"><span class="${statusStyle(r.durum)}">${r.durum}</span></span></div>
    ${r.not ? `<div class="detail-row"><span class="detail-key">Not</span><span class="detail-val" style="font-size:12px;color:var(--gray)">${r.not}</span></div>` : ''}
  `;
  const ceki = Array.isArray(r.ceki) ? r.ceki : [];
  const tamam = ceki.filter(c=>c.tamam).length;
  let cekiHtml = `<div class="ceki-title">Çeki Listesi <span style="font-weight:400;color:var(--gray)">${tamam}/${ceki.length}</span></div>`;
  if(ceki.length) {
    ceki.forEach((c,i) => {
      cekiHtml += `<div class="ceki-item">
        <div class="ceki-check${c.tamam?' checked':''}" onclick="toggleCeki('${id}',${i})" style="cursor:pointer"></div>
        <span class="ceki-name" style="${c.tamam?'text-decoration:line-through;color:var(--gray)':''}">${c.malzeme}</span>
        <span class="ceki-qty">${c.miktar} ${c.birim}</span>
      </div>`;
    });
  } else cekiHtml += '<div style="font-size:13px;color:var(--gray);padding:8px 0">Kalem eklenmemiş.</div>';
  document.getElementById('d-ceki').innerHTML = cekiHtml;
  document.getElementById('detail-overlay').classList.add('open');
}

async function toggleCeki(id, idx) {
  const r = data.find(d=>String(d.id)===String(id));
  if(!r) return;
  r.ceki[idx].tamam = !r.ceki[idx].tamam;
  renderTable(); openDetail(id);
  showLoading(true);
  await apiCall("save", { item: r });
  showLoading(false);
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  currentDetail = null;
}

function editCurrent() {
  if(!currentDetail) return;
  closeDetail();
  openEdit(currentDetail);
}

let cekiRows = [];

function openNew() {
  editingId = null;
  cekiRows = [];
  document.getElementById('modal-title-text').textContent = 'Yeni Sevkiyat';
  ['proje','musteri','not'].forEach(k => document.getElementById('f-'+k).value = '');
  document.getElementById('f-sorumlu').value = '';
  document.getElementById('f-durum').value = 'Bekliyor';
  document.getElementById('f-tasima').value = '';
  document.getElementById('f-tarih').value = '';
  renderCekiBody();
  document.getElementById('modal-new').classList.add('open');
}

function openEdit(id) {
  const r = data.find(d=>String(d.id)===String(id));
  if(!r) return;
  editingId = id;
  document.getElementById('modal-title-text').textContent = 'Sevkiyat Düzenle';
  document.getElementById('f-proje').value = r.proje;
  document.getElementById('f-musteri').value = r.musteri;
  document.getElementById('f-sorumlu').value = r.sorumlu||'';
  document.getElementById('f-durum').value = r.durum;
  document.getElementById('f-tasima').value = r.tasima||'';
  document.getElementById('f-tarih').value = r.tarih||'';
  document.getElementById('f-not').value = r.not||'';
  cekiRows = (r.ceki||[]).map(c=>({...c}));
  renderCekiBody();
  document.getElementById('modal-new').classList.add('open');
}

function closeModal() { document.getElementById('modal-new').classList.remove('open'); }

function addCekiRow() {
  cekiRows.push({ malzeme:'', miktar:1, birim:'Adet', tamam:false });
  renderCekiBody();
}

function renderCekiBody() {
  const tb = document.getElementById('ceki-tbody');
  if(!cekiRows.length) { tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--gray);font-size:12px;padding:12px">Kalem yok — "Kalem Ekle" ile başlayın</td></tr>'; return; }
  tb.innerHTML = cekiRows.map((c,i) => `<tr>
    <td><input type="checkbox" ${c.tamam?'checked':''} onchange="cekiRows[${i}].tamam=this.checked"></td>
    <td><input type="text" value="${c.malzeme}" oninput="cekiRows[${i}].malzeme=this.value" placeholder="Malzeme adı"></td>
    <td><input type="number" value="${c.miktar}" min="0" oninput="cekiRows[${i}].miktar=+this.value" style="width:60px"></td>
    <td>
      <select style="border:1px solid var(--line);border-radius:5px;padding:4px 6px;font-size:12px;font-family:inherit" onchange="cekiRows[${i}].birim=this.value">
        ${['Adet','Takım','Set','Kg','m','Litre'].map(u=>`<option${c.birim===u?' selected':''}>${u}</option>`).join('')}
      </select>
    </td>
    <td><button class="del-row" onclick="cekiRows.splice(${i},1);renderCekiBody()">✕</button></td>
  </tr>`).join('');
}

async function saveSevkiyat() {
  const proje = document.getElementById('f-proje').value.trim();
  const musteri = document.getElementById('f-musteri').value.trim();
  if(!proje || !musteri) { toast('Proje adı ve müşteri zorunludur!'); return; }
  const obj = {
    id: editingId || Date.now(),
    proje, musteri,
    sorumlu: document.getElementById('f-sorumlu').value,
    durum: document.getElementById('f-durum').value,
    tasima: document.getElementById('f-tasima').value,
    tarih: document.getElementById('f-tarih').value,
    not: document.getElementById('f-not').value,
    ceki: cekiRows.map(c=>({...c}))
  };
  if(editingId) { const idx=data.findIndex(d=>String(d.id)===String(editingId)); data[idx]=obj; }
  else data.unshift(obj);
  closeModal(); renderStats(); renderTable();
  showLoading(true);
  await apiCall("save", { item: obj });
  showLoading(false);
  toast(editingId ? 'Sevkiyat güncellendi.' : 'Yeni sevkiyat eklendi.');
}

function setPage(page, el) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  const titles = { sevkiyatlar:'Tüm Sevkiyatlar', bekleyenler:'Bekleyen Sevkiyatlar', tamamlananlar:'Tamamlanan Sevkiyatlar', ozet:'Özet & İstatistik' };
  document.getElementById('page-title').textContent = titles[page];
  document.getElementById('table-title').textContent = titles[page];
  if(page==='ozet') renderOzet(); else renderTable();
}

function renderOzet() {
  const sorumluMap = {};
  data.forEach(d => { const s = d.sorumlu||'Atanmamış'; sorumluMap[s] = (sorumluMap[s]||0)+1; });
  let html = '<div style="padding:20px"><div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--mid)">Kişi Bazlı Sevkiyat Sayısı</div>';
  Object.entries(sorumluMap).forEach(([k,v]) => {
    const pct = Math.round(v/data.length*100);
    html += `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>${k}</span><span style="color:var(--gray)">${v} sevkiyat</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('table-wrap').innerHTML = html;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

loadData();
</script>
</body>
</html>
